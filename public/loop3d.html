<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop Floor Intelligence — 3D Demo Feed (CAM-01)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0e12; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .hud {
      position: fixed; top: 14px; left: 16px; z-index: 2;
      color: #9aa6b2; font: 600 14px ui-monospace, Menlo, monospace;
      letter-spacing: 0.08em; text-shadow: 0 1px 3px #000; pointer-events: none;
    }
  </style>
  <!-- Import map MUST precede the module script. Pinned three r184 from one CDN. -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="hud">SHOP FLOOR INTELLIGENCE · 3D DEMO FEED · CAM-01 (corner-mounted)</div>
  <canvas id="c"></canvas>
  <script type="module">
    import * as THREE from 'three';

    // A fixed camera bolted in the top corner of a shop, overlooking several CNC
    // machines, scrap bins, a walkway and an operator. Machines cycle running/idle/
    // stopped on staggered timelines (so the agent always has something to catch),
    // and a forklift periodically crosses close to the lens to trip obstruction
    // detection. Deterministic (time-based) so every loop classifies identically.

    const canvas = document.getElementById('c');
    // preserveDrawingBuffer:true is REQUIRED so /live's ctx.drawImage(canvas,...) readback
    // works on a WebGL canvas — without it the sampled frame can come back blank.
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0b0e12');
    scene.fog = new THREE.Fog('#0b0e12', 34, 78);

    // Fixed high-corner CCTV camera.
    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(-16, 13.5, 15.5);
    camera.lookAt(2, 1.2, -2);
    scene.add(camera); // so the camera-mounted occluder renders

    // Flat, even factory lighting (cheap; no shadows, no postprocessing).
    scene.add(new THREE.HemisphereLight(0xcdddee, 0x20242a, 1.0));
    const dir = new THREE.DirectionalLight(0xffffff, 0.85);
    dir.position.set(-12, 22, 10);
    scene.add(dir);

    // ---- Floor + corner walls ----
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 46),
      new THREE.MeshStandardMaterial({ color: 0x262b31, roughness: 0.96 }),
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);

    // Painted walkway stripe down the aisle.
    const lane = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 3),
      new THREE.MeshStandardMaterial({ color: 0x3a4048, roughness: 1 }),
    );
    lane.rotation.x = -Math.PI / 2;
    lane.position.set(0, 0.01, 6);
    scene.add(lane);

    const wallMat = new THREE.MeshStandardMaterial({ color: 0x1b2026, roughness: 1 });
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(60, 22), wallMat);
    backWall.position.set(0, 11, -12);
    scene.add(backWall);
    const sideWall = new THREE.Mesh(new THREE.PlaneGeometry(46, 22), wallMat);
    sideWall.rotation.y = Math.PI / 2;
    sideWall.position.set(-22, 11, 0);
    scene.add(sideWall);

    // ---- Shared geometries / materials (keep draw calls + allocations low) ----
    const bodyGeo = new THREE.BoxGeometry(3.2, 2.4, 2.4);
    const headGeo = new THREE.BoxGeometry(2.6, 1.0, 2.0);
    const spindleGeo = new THREE.BoxGeometry(0.42, 1.7, 0.42);
    const lampGeo = new THREE.CylinderGeometry(0.24, 0.24, 0.42, 16);
    const poleGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.6, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3a4048, roughness: 0.7, metalness: 0.2 });
    const headMat = new THREE.MeshStandardMaterial({ color: 0x50565f, roughness: 0.6, metalness: 0.25 });
    const spindleMat = new THREE.MeshStandardMaterial({ color: 0x9aa4b0, roughness: 0.4, metalness: 0.6 });
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x6b7079, roughness: 0.6 });
    const binMat = new THREE.MeshStandardMaterial({ color: 0x5b4326, roughness: 0.9 });

    const LAMP = {
      stopped: 0xe62d28,
      idle: 0xf0b91e,
      running: 0x37d25a,
    };
    const LAMP_ORDER = ['stopped', 'idle', 'running']; // top -> bottom

    function makeMachine() {
      const g = new THREE.Group();
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 1.2;
      g.add(body);
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.set(0, 2.9, 0.1);
      g.add(head);
      const spindle = new THREE.Mesh(spindleGeo, spindleMat);
      spindle.position.set(0, 1.6, 1.2);
      g.add(spindle);

      // Andon stack light on the back-right corner.
      const pole = new THREE.Mesh(poleGeo, poleMat);
      pole.position.set(1.4, 3.0, -1.0);
      g.add(pole);
      const lamps = {};
      LAMP_ORDER.forEach((state, i) => {
        const mat = new THREE.MeshStandardMaterial({
          color: LAMP[state],
          emissive: LAMP[state],
          emissiveIntensity: 0,
          roughness: 0.4,
        });
        const lamp = new THREE.Mesh(lampGeo, mat);
        lamp.position.set(1.4, 4.3 - i * 0.46, -1.0);
        g.add(lamp);
        lamps[state] = mat;
      });

      // Scrap/chip bin beside the machine.
      const bin = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.0, 1.3), binMat);
      bin.position.set(-2.3, 0.5, 1.1);
      g.add(bin);

      function setState(state, t) {
        for (const s of LAMP_ORDER) {
          lamps[s].emissiveIntensity = s === state ? 1.7 : 0.0;
          lamps[s].color.setHex(s === state ? LAMP[state] : 0x202327);
        }
        // Spindle reciprocates only while running.
        spindle.position.y = state === 'running' ? 1.6 + Math.sin(t * 6) * 0.45 : 1.6;
      }
      return { group: g, setState };
    }

    const POSX = [-9, -3, 3, 9];
    const machines = POSX.map((x) => {
      const m = makeMachine();
      m.group.position.set(x, 0, -2);
      scene.add(m.group);
      return m;
    });

    // Blocky operator that walks the aisle (steps away from the floor over time).
    const operator = new THREE.Group();
    const opMat = new THREE.MeshStandardMaterial({ color: 0x2f6f8f, roughness: 0.8 });
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.1, 0.45), opMat);
    torso.position.y = 1.1;
    const headM = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12), new THREE.MeshStandardMaterial({ color: 0xd8b48a }));
    headM.position.y = 1.95;
    operator.add(torso, headM);
    scene.add(operator);

    // Forklift / pallet block — the OBSTRUCTION actor, mounted to the camera so it can
    // sweep right across the lens and near-fill the frame (low variance => obstructed).
    const occluder = new THREE.Mesh(
      new THREE.BoxGeometry(9, 7, 0.4),
      new THREE.MeshStandardMaterial({ color: 0x0c0e12, roughness: 1, metalness: 0 }),
    );
    occluder.position.set(20, 0, -2.6); // parked off to the side, 2.6 in front of camera
    camera.add(occluder);

    const STATE_AT = (i, t) => {
      const s = (t + i * 5) % 24; // staggered phase per machine
      if (s < 9) return 'running';
      if (s < 13) return 'idle';
      if (s < 19) return 'stopped';
      return 'running';
    };

    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);

    function animate() {
      const t = performance.now() / 1000;
      for (let i = 0; i < machines.length; i++) machines[i].setState(STATE_AT(i, t), t);

      operator.position.set(-6 + Math.sin(t * 0.35) * 5, 0, 4.5 + Math.cos(t * 0.35) * 1.5);
      operator.rotation.y = Math.cos(t * 0.35) > 0 ? 0.5 : -0.5;

      // Obstruction window on a 48s super-cycle: forklift crosses close to the lens.
      const cyc = t % 48;
      if (cyc > 40 && cyc < 47) {
        const p = (cyc - 40) / 7; // 0..1
        occluder.position.x = -9 + p * 18; // sweep across, fully blocking mid-window
      } else {
        occluder.position.x = 20; // parked out of frame
      }

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
