<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop Floor Intelligence — 3D Demo Feed (CAM-01)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0e12; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    .hud {
      position: fixed; top: 14px; left: 16px; z-index: 2;
      color: #cdd6e0; font: 600 14px ui-monospace, Menlo, monospace;
      letter-spacing: 0.08em; text-shadow: 0 1px 3px #000; pointer-events: none;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="hud">SHOP FLOOR INTELLIGENCE · 3D DEMO FEED · CAM-01 (corner-mounted)</div>
  <canvas id="c"></canvas>
  <script type="module">
    import * as THREE from 'three';

    // A fixed corner camera overlooks FOUR visually-distinct machines — a teal lathe,
    // a steel mill, an orange C-frame press, and a blue CNC cabinet — each with an
    // andon stack light, cycling running/idle/stopped on staggered timelines, plus a
    // forklift that periodically crosses the lens to trip obstruction detection.
    // Deterministic (time-based) so every loop classifies identically.

    const canvas = document.getElementById('c');
    // preserveDrawingBuffer:true so /live's drawImage(canvas,...) readback works.
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0d1016');
    scene.fog = new THREE.Fog('#0d1016', 40, 90);

    const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(-16, 13.5, 15.5);
    camera.lookAt(2, 1.4, -2);
    scene.add(camera);

    // Brighter factory lighting so the distinct colors read on camera.
    scene.add(new THREE.HemisphereLight(0xdfeaf5, 0x2a2f36, 1.35));
    scene.add(new THREE.AmbientLight(0x4a5160, 0.5));
    const dir = new THREE.DirectionalLight(0xffffff, 1.15);
    dir.position.set(-10, 22, 12);
    scene.add(dir);
    const fill = new THREE.DirectionalLight(0xafc4dd, 0.4);
    fill.position.set(14, 10, 8);
    scene.add(fill);

    // Floor + corner walls (lighter so the scene isn't a void).
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(64, 48), new THREE.MeshStandardMaterial({ color: 0x333a43, roughness: 0.96 }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    const lane = new THREE.Mesh(new THREE.PlaneGeometry(64, 3), new THREE.MeshStandardMaterial({ color: 0x44505c, roughness: 1 }));
    lane.rotation.x = -Math.PI / 2;
    lane.position.set(0, 0.01, 6);
    scene.add(lane);
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x222831, roughness: 1 });
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(64, 24), wallMat);
    backWall.position.set(0, 12, -12);
    scene.add(backWall);
    const sideWall = new THREE.Mesh(new THREE.PlaneGeometry(48, 24), wallMat);
    sideWall.rotation.y = Math.PI / 2;
    sideWall.position.set(-24, 12, 0);
    scene.add(sideWall);

    const LAMP = { stopped: 0xe62d28, idle: 0xf0b91e, running: 0x37d25a };
    const LAMP_ORDER = ['stopped', 'idle', 'running'];

    function box(w, h, d, color, rough = 0.6, metal = 0.25) {
      return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal }));
    }
    // Mesh.position is read-only in three r184 — set it, don't reassign via Object.assign.
    function at(mesh, x, y, z) {
      mesh.position.set(x, y, z);
      return mesh;
    }
    function lighten(hex, f) {
      const c = new THREE.Color(hex);
      c.multiplyScalar(f);
      return c.getHex();
    }

    // Andon stack light shared across machines; returns the lamp materials to drive.
    function addStackLight(group, x, z) {
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 2.0, 8), new THREE.MeshStandardMaterial({ color: 0x70757e }));
      pole.position.set(x, 3.2, z);
      group.add(pole);
      const lamps = {};
      LAMP_ORDER.forEach((state, i) => {
        const mat = new THREE.MeshStandardMaterial({ color: LAMP[state], emissive: LAMP[state], emissiveIntensity: 0, roughness: 0.4 });
        const lamp = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.26, 0.46, 16), mat);
        lamp.position.set(x, 4.9 - i * 0.5, z);
        group.add(lamp);
        lamps[state] = mat;
      });
      return lamps;
    }

    // Each machine: distinct color + silhouette + a moving part that animates while running.
    function makeMachine(kind) {
      const g = new THREE.Group();
      let lamps, animate;

      if (kind === 'lathe') {
        // Teal, long & low, with a horizontal chuck/workpiece that SPINS.
        const color = 0x2f9d7f;
        g.add(at(box(4.2, 1.5, 1.8, color), 0, 0.75, 0));
        g.add(at(box(4.2, 0.4, 1.9, lighten(color, 1.3)), 0, 1.55, 0)); // bed
        const head = box(1.0, 1.1, 1.9, lighten(color, 0.8));
        head.position.set(-1.7, 2.1, 0);
        g.add(head);
        const chuck = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 3.0, 20), new THREE.MeshStandardMaterial({ color: 0xc9d2dc, roughness: 0.35, metalness: 0.7 }));
        chuck.rotation.z = Math.PI / 2;
        chuck.position.set(0.4, 2.0, 0);
        g.add(chuck);
        lamps = addStackLight(g, 1.9, -0.8);
        animate = (t) => { chuck.rotation.x = t * 7; };
      } else if (kind === 'mill') {
        // Steel gray, tall, with a vertical spindle that reciprocates.
        const color = 0x7b8694;
        g.add(at(box(2.6, 2.6, 2.4, color), 0, 1.3, 0));
        const colmn = box(1.4, 1.6, 1.4, lighten(color, 0.85));
        colmn.position.set(0, 3.2, -0.4);
        g.add(colmn);
        const spindle = box(0.5, 1.5, 0.5, 0xcfd7e0);
        spindle.position.set(0, 2.9, 0.7);
        g.add(spindle);
        lamps = addStackLight(g, 1.5, -1.0);
        animate = (t) => { spindle.position.y = 2.9 + Math.sin(t * 6) * 0.5; };
      } else if (kind === 'press') {
        // Orange C-frame press, with a ram that stamps down.
        const color = 0xc8782e;
        g.add(at(box(2.4, 1.0, 2.2, color), 0, 0.5, 0)); // base
        const column = box(0.9, 3.4, 1.6, lighten(color, 0.85));
        column.position.set(-1.0, 2.2, -0.3);
        g.add(column);
        const overhang = box(2.6, 0.8, 1.6, lighten(color, 1.1));
        overhang.position.set(0.1, 3.7, -0.3);
        g.add(overhang);
        const ram = box(0.7, 1.3, 0.7, 0xcfd7e0);
        ram.position.set(0.6, 2.5, 0);
        g.add(ram);
        lamps = addStackLight(g, 1.7, -1.0);
        animate = (t) => { ram.position.y = 2.3 + (Math.sin(t * 5) * 0.5 + 0.5) * 0.7; };
      } else {
        // Blue CNC cabinet (enclosed) with a window that glows while running.
        const color = 0x3f74c0;
        g.add(at(box(2.8, 3.0, 2.6, color), 0, 1.5, 0));
        const winMat = new THREE.MeshStandardMaterial({ color: 0x9fd0e6, emissive: 0x2a6f8f, emissiveIntensity: 0.2, roughness: 0.3 });
        const win = new THREE.Mesh(new THREE.BoxGeometry(1.7, 1.4, 0.1), winMat);
        win.position.set(0, 1.8, 1.32);
        g.add(win);
        lamps = addStackLight(g, 1.7, -1.1);
        animate = (t) => { winMat.emissiveIntensity = 0.5 + Math.sin(t * 8) * 0.3; };
      }

      function setState(state, t) {
        for (const s of LAMP_ORDER) {
          lamps[s].emissiveIntensity = s === state ? 1.8 : 0.0;
          lamps[s].color.setHex(s === state ? LAMP[state] : 0x20242a);
        }
        if (state === 'running') animate(t);
      }
      return { group: g, setState };
    }

    const SPECS = ['lathe', 'mill', 'press', 'cnc'];
    const POSX = [-9.5, -3, 3.5, 10];
    const machines = SPECS.map((kind, i) => {
      const m = makeMachine(kind);
      m.group.position.set(POSX[i], 0, -2);
      scene.add(m.group);
      // scrap bin beside each
      const bin = box(1.3, 1.0, 1.3, 0x6b4a26, 0.9, 0);
      bin.position.set(POSX[i] - 2.6, 0.5, 1.2);
      scene.add(bin);
      return m;
    });

    // Walking operator (torso + head).
    const operator = new THREE.Group();
    const torso = box(0.7, 1.1, 0.45, 0x2f6f8f, 0.8, 0);
    torso.position.y = 1.1;
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 12), new THREE.MeshStandardMaterial({ color: 0xd8b48a }));
    head.position.y = 1.95;
    operator.add(torso, head);
    scene.add(operator);

    // Forklift / pallet block — obstruction actor mounted to the camera.
    const occluder = new THREE.Mesh(new THREE.BoxGeometry(9, 7, 0.4), new THREE.MeshStandardMaterial({ color: 0x0c0e12, roughness: 1 }));
    occluder.position.set(20, 0, -2.6);
    camera.add(occluder);

    const STATE_AT = (i, t) => {
      const s = (t + i * 5) % 24;
      if (s < 9) return 'running';
      if (s < 13) return 'idle';
      if (s < 19) return 'stopped';
      return 'running';
    };

    function resize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);

    function animate() {
      const t = performance.now() / 1000;
      for (let i = 0; i < machines.length; i++) machines[i].setState(STATE_AT(i, t), t);
      operator.position.set(-6 + Math.sin(t * 0.35) * 5, 0, 4.5 + Math.cos(t * 0.35) * 1.5);
      operator.rotation.y = Math.cos(t * 0.35) > 0 ? 0.5 : -0.5;
      const cyc = t % 48;
      occluder.position.x = cyc > 40 && cyc < 47 ? -9 + ((cyc - 40) / 7) * 18 : 20;
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
</html>
